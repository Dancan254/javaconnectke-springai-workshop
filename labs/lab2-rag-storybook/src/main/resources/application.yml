spring:
  application:
    name: lab2-rag-storybook

  config:
    import: optional:classpath:keys.properties

  mvc:
    async:
      request-timeout: -1

  ai:
    azure:
      openai:
        api-key: ${azure.openai.api-key}
        endpoint: ${azure.openai.endpoint}
        chat:
          options:
            deployment-name: ${azure.openai.chat.deployment.name:gpt-4.1}
            temperature: 0.7
            max-tokens: 1024
        embedding:
          options:
            deployment-name: ${azure.openai.embedding.deployment.name:text-embedding-3-large}

    # ── Vector Store — ChromaDB ────────────────────────────────────────────────
    #
    # ChromaDB runs locally via Docker (see docker-compose.yml).
    # Spring AI connects over HTTP on port 8000 — no JDBC driver needed.
    #
    # client.host              — must include the scheme (http://). The auto-
    #                            configuration builds the base URL as host:port,
    #                            so "http://localhost:8000" requires the scheme here.
    # initialize-schema=true   — Spring AI auto-creates the collection on startup.
    #                            No manual DDL or migrations required.
    # collection-name          — logical grouping for our story embeddings inside
    #                            ChromaDB. Analogous to a table in SQL.
    #
    vectorstore:
      chroma:
        client:
          host: http://localhost
          port: 8000
        collection-name: karibu-stories
        initialize-schema: true

    chat:
      observation:
        include-prompt: true
        include-completion: true

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      lab: lab2
    distribution:
      percentiles-histogram:
        http.server.requests: true
        gen_ai.client.operation: true

info:
  app:
    name: Lab 2 — RAG Storybook
    description: JavaConnect KE Spring AI Workshop — RAG with Azure OpenAI + ChromaDB

#
# Our code logs at DEBUG so every RAG step is visible in the console:
#   [RAG][INGEST] Reading story...
#   [RAG][INGEST] Split into N chunks...
#   [RAG][QUERY]  Searching for: "..."
#
# The Spring AI advisor logger shows the FULL prompt sent to the model,
# including the retrieved story chunks injected by QuestionAnswerAdvisor.
# Enable it at DEBUG to see exactly what the LLM receives.
#
logging:
  level:
    org.springframework: WARN
    ke.javaconnect: DEBUG
    org.springframework.ai.chat.client.advisor: DEBUG
    org.springframework.ai.vectorstore: DEBUG

app:
  chat:
    memory:
      max-messages: 10
  rag:
    similarity-threshold: 0.4
    top-k: 5
  story:
    resource: classpath:story/the-chronicles-of-karibu-valley.md
