spring:
  application:
    name: lab2-rag-storybook

  # ── Import secrets from keys.properties (gitignored) ────────────────────────
  #
  # keys.properties holds all Azure + Neon credentials.
  # The file is excluded from git so secrets never enter version control.
  # The 'optional:' prefix means the app still starts without the file
  # (useful for CI where env vars may be injected differently).
  #
  config:
    import: optional:classpath:keys.properties

  # ── MVC ───────────────────────────────────────────────────────────────────────
  mvc:
    async:
      request-timeout: -1

  # ── DataSource — Neon PostgreSQL ─────────────────────────────────────────────
  #
  # Connection details come from keys.properties:
  #   spring.datasource.url      = jdbc:postgresql://<host>.neon.tech/neondb?sslmode=require
  #   spring.datasource.username = <neon-user>
  #   spring.datasource.password = <neon-password>
  #
  datasource:
    url: ${spring.datasource.url}
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5         # keep small — Neon free tier has connection limits
      minimum-idle: 1

  # ── Flyway ────────────────────────────────────────────────────────────────────
  #
  # Flyway runs V1__create_vector_store.sql BEFORE PgVectorStore initialises,
  # ensuring the vector_store table + pgvector extension already exist.
  # Spring Boot auto-configures Flyway from the DataSource above.
  #
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true     # safe for existing Neon databases

  # ── Spring AI — Azure OpenAI ─────────────────────────────────────────────────
  #
  # Both the chat model and the embedding model share the same Azure endpoint
  # and API key. Deployment names are separate Azure deployments.
  #
  ai:
    azure:
      openai:
        api-key: ${azure.openai.api-key}
        endpoint: ${azure.openai.endpoint}
        chat:
          options:
            deployment-name: ${azure.openai.chat.deployment:gpt-4o}
            temperature: 0.7
            max-tokens: 1024
        embedding:
          options:
            deployment-name: ${azure.openai.embedding.deployment:text-embedding-ada-002}

    # ── Vector Store — PgVector ────────────────────────────────────────────────
    #
    # initialize-schema=false — Flyway owns the DDL, not Spring AI.
    # dimensions=1536          — must match text-embedding-ada-002 output size.
    # distance-type=COSINE     — cosine similarity, standard for text embeddings.
    # index-type=IVFFLAT       — approximate nearest-neighbour for large datasets.
    #
    vectorstore:
      pgvector:
        initialize-schema: false
        index-type: IVFFLAT
        distance-type: COSINE_DISTANCE
        dimensions: 1536

    # ── Observability — include full prompt + completion in traces ────────────
    chat:
      observation:
        include-prompt: true
        include-completion: true

# ── Actuator + Observability ──────────────────────────────────────────────────
management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      lab: lab2
    distribution:
      percentiles-histogram:
        http.server.requests: true
        gen_ai.client.operation: true

info:
  app:
    name: Lab 2 — RAG Storybook
    description: JavaConnect KE Spring AI Workshop — RAG with Azure OpenAI + PgVector

# ── Logging ───────────────────────────────────────────────────────────────────
#
# Our code logs at DEBUG so every RAG step is visible in the console:
#   [RAG][INGEST] Reading story...
#   [RAG][INGEST] Split into N chunks...
#   [RAG][QUERY]  Searching for: "..."
#
# The Spring AI advisor logger shows the FULL prompt sent to the model,
# including the retrieved story chunks injected by QuestionAnswerAdvisor.
# Enable it at DEBUG to see exactly what the LLM receives.
#
logging:
  level:
    org.springframework: WARN
    ke.javaconnect: DEBUG
    org.springframework.ai.chat.client.advisor: DEBUG
    org.springframework.ai.vectorstore: DEBUG
    org.flywaydb: INFO

# ── Application Settings ──────────────────────────────────────────────────────
app:
  chat:
    memory:
      max-messages: 10
  rag:
    similarity-threshold: 0.65
    top-k: 5
  story:
    resource: classpath:story/the-chronicles-of-karibu-valley.md
