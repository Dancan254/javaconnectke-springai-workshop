spring:
  application:
    name: lab1-chatbot
  mvc:
    async:
      request-timeout: -1
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.2
        options:
          temperature: 0.7
          num-predict: 512
    chat:
      observation:
        include-prompt: true
        include-completion: true

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      lab: lab1
    distribution:
      percentiles-histogram:
        http.server.requests: true
        gen_ai.client.operation: true

info:
  app:
    name: Lab 1 — ChatClient & Chat Memory
    description: JavaConnect KE Spring AI Workshop

logging:
  level:
    org.springframework: WARN
    ke.javaconnect: INFO

app:
  chat:
    memory:
      max-messages: 10
