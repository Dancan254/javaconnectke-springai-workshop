spring:
  application:
    name: lab1-chatbot
  mvc:
    async:
      request-timeout: -1
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.1-8b-instant
          temperature: 0.7
          max-tokens: 1024
    chat:
      observation:
        include-prompt: true
        include-completion: true

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      lab: lab1
    distribution:
      percentiles-histogram:
        http.server.requests: true
        gen_ai.client.operation: true

info:
  app:
    name: Lab 1 — ChatClient & Chat Memory
    description: JavaConnect KE Spring AI Workshop

logging:
  level:
    org.springframework: WARN
    ke.javaconnect: INFO
    org.springframework.ai.chat.client.advisor: DEBUG
    org.springframework.ai.vectorstore: DEBUG

app:
  chat:
    memory:
      max-messages: 10
