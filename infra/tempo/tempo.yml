server:
  http_listen_port: 3200

# Receive traces over OTLP (what Spring Boot sends)
distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318   # Spring Boot pushes here
        grpc:
          endpoint: 0.0.0.0:4317

# Store traces locally (fine for a workshop)
storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

# Allow Grafana to query traces
query_frontend:
  search:
    max_duration: 0

